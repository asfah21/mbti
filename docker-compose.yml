services:
  mbti-app:
    build: .
    container_name: mbti
    restart: always
    ports:
      - "8086:8080" # Pakai 8086 biar gak bentrok sama port lain
    environment:
      - GIN_MODE=release
      - TZ=Asia/Jakarta
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - app-network

networks:
  app-network:
    external: true
